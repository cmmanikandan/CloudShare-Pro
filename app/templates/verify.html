{% extends 'layout.html' %}

{% block content %}
<div class="max-w-md mx-auto px-6 py-20">
    <div class="minimal-container p-8 space-y-8 text-center">
        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto">
            <i class="bi bi-shield-lock"></i>
        </div>
        
        <div class="space-y-2">
            <h2 class="text-2xl font-black text-slate-900">Verify Your Account</h2>
            <p class="text-sm text-slate-500 font-medium">We've sent a 6-digit code to <br><span class="font-bold text-slate-900">{{ email }}</span></p>
        </div>

        <form method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block text-left">Verification Code</label>
                <input type="text" name="code" placeholder="123456" maxlength="6" required 
                       class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 text-center text-2xl font-bold tracking-[1em] focus:border-blue-600 outline-none transition">
            </div>
            
            <button type="submit" class="w-full btn-minimal-primary py-4">Verify Account</button>
        </form>

        <p class="text-xs text-slate-400 font-medium pt-4">
            Didn't receive the code? <a href="#" class="text-blue-600 font-bold hover:underline">Resend</a>
        </p>
    </div>
</div>
{% endblock %}
