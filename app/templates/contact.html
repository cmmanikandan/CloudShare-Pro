{% extends 'layout.html' %}

{% block content %}
<div class="max-w-4xl mx-auto py-20 px-6 animate-fade-in">
    <div class="text-center mb-16 space-y-4">
        <h1 class="text-5xl font-black tracking-tight text-slate-900">Get in Touch</h1>
        <p class="text-lg text-slate-500 font-medium">We're here to help you with anything you need.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <!-- Contact Info -->
        <div class="lg:col-span-1 space-y-8">
            <div class="space-y-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Email Us</h3>
                <p class="text-lg font-bold text-slate-900">support@cloudshare.pro</p>
                <p class="text-sm text-slate-500">Expect a response within 24 hours.</p>
            </div>
            <div class="space-y-4">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Office</h3>
                <p class="text-lg font-bold text-slate-900">Tech Hub, San Francisco</p>
                <p class="text-sm text-slate-500">123 Cloud Street, CA 94103</p>
            </div>
            <div class="pt-8 flex gap-4">
                <a href="#" class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 transition"><i class="bi bi-twitter-x"></i></a>
                <a href="#" class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 transition"><i class="bi bi-github"></i></a>
                <a href="#" class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 transition"><i class="bi bi-linkedin"></i></a>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="lg:col-span-2 minimal-container p-8">
            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Full Name</label>
                        <input type="text" placeholder="John Doe" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-sm outline-none focus:border-blue-600 transition">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Email Address</label>
                        <input type="email" placeholder="name@company.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-sm outline-none focus:border-blue-600 transition">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Message</label>
                    <textarea rows="5" placeholder="How can we help?" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-sm outline-none focus:border-blue-600 transition resize-none"></textarea>
                </div>
                <button type="submit" class="w-full btn-minimal-primary py-4">Send Message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
