{% extends 'layout.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-6 py-20 animate-fade-in">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
        <!-- Contact Info -->
        <div class="space-y-10">
            <div class="space-y-4">
                <h1 class="text-5xl font-black tracking-tight text-slate-900">Let's Talk.</h1>
                <p class="text-lg text-slate-500">Have a question or need a custom enterprise solution? Our team is here to help.</p>
            </div>
            
            <div class="space-y-8">
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                        <i class="bi bi-envelope"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Support Email</p>
                        <p class="font-bold text-slate-900">manikandanprabhu37@gmail.com</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                        <i class="bi bi-telegram"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Telegram Bot</p>
                        <a href="https://t.me/CloudShareProbot" target="_blank" class="font-bold text-blue-600 hover:underline">@CloudShareProbot</a>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                        <i class="bi bi-geo-alt"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Headquarters</p>
                        <p class="font-bold text-slate-900">Tamil Nadu, India</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="minimal-container p-10 space-y-8 shadow-2xl">
            <h3 class="text-2xl font-bold text-slate-900">Send us a message</h3>
            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase">First Name</label>
                        <input type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-sm outline-none focus:border-blue-600 transition">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase">Last Name</label>
                        <input type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-sm outline-none focus:border-blue-600 transition">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase">Work Email</label>
                    <input type="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-sm outline-none focus:border-blue-600 transition">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase">Message</label>
                    <textarea class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-sm outline-none focus:border-blue-600 transition h-32 resize-none"></textarea>
                </div>
                <button type="submit" class="w-full btn-minimal-primary py-4">Send Message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
