{% extends 'layout.html' %}

{% block content %}
<div class="max-w-md mx-auto py-20 px-6 animate-fade-in">
    <div class="text-center mb-10 space-y-2">
        <h1 class="text-3xl font-black tracking-tight text-slate-900">Create Account</h1>
        <p class="text-sm text-slate-500 font-medium">Join CloudShare Pro and start sharing</p>
    </div>

    <!-- Register Card -->
    <div class="minimal-container p-8 shadow-sm">
        <form action="/auth/register" method="POST" class="space-y-6">
            <div class="space-y-2">
                <label for="username" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Full Name</label>
                <div class="relative group">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-600 transition-colors">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" id="username" name="username" required placeholder="John Doe" style="padding-left: 64px;" class="w-full py-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-600 focus:bg-white transition-all text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label for="email" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Email Address</label>
                <div class="relative group">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-600 transition-colors">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input type="email" id="email" name="email" required placeholder="name@company.com" style="padding-left: 64px;" class="w-full py-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-600 focus:bg-white transition-all text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label for="password" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Password</label>
                <div class="relative group">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-600 transition-colors">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" id="password" name="password" required placeholder="••••••••" style="padding-left: 64px;" class="w-full py-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-600 focus:bg-white transition-all text-sm">
                </div>
            </div>

            <div class="flex items-start gap-2">
                <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                <label for="terms" class="text-xs font-medium text-slate-500">
                    I agree to the <a href="#" class="text-blue-600 hover:underline">Terms of Service</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>.
                </label>
            </div>

            <button type="submit" class="w-full btn-minimal-primary py-4 text-lg">Create Account</button>
        </form>

        <!-- Divider -->
        <div class="relative py-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
            <div class="relative flex justify-center"><span class="bg-white px-4 text-xs font-black text-slate-300 uppercase">Or sign up with</span></div>
        </div>

        <!-- Social Login -->
        <button class="w-full btn-minimal-secondary flex items-center justify-center gap-3 py-3 text-sm">
            <i class="bi bi-google"></i>
            Google
        </button>
    </div>

    <p class="mt-8 text-center text-sm text-slate-500">
        Already have an account? 
        <a href="/auth/login" class="text-blue-600 font-bold hover:underline">Sign In</a>
    </p>
</div>
{% endblock %}
